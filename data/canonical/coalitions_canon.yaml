# Kanon istatistikleri (kayıt için):
# - Toplam koalisyon: 31
# - Tip dağılımı: alliance=10, bloc=14, summit_group=3, de_facto=4 (NAM dahil)
# - Dönem kapsamı: 1945-2016
# - Bölge dağılımı: euro-atlantic ağırlıklı; sonraki sürümde dengelenebilir
#
# COW kodu doğrulama notu (2026-05-15):
# - Tüm kodlar COW state system (system2016.csv) ile çapraz kontrol edildi
# - Alman birleşmesi: GFR(260) + GMY(255) her iki kod ilgili dönemlerde listelendi
# - Yemen: YAR(678), YPR(680), birleşik YEM(679) — country_master filtresi yıla göre seçer
# - Malta(338) düzeltildi (önceki 343 = K.Makedonya hatasıydı)
# - 2016 sonrası genişlemeler kapsam dışı (state system 2016'da bitiyor)
