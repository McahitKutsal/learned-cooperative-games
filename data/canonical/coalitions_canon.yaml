# Tarihsel Koalisyon Kanonu
# ============================
#
# CoalitionGNN projesi için pozitif koalisyon örnekleri.
# Her giriş bir tarihsel olarak gözlemlenmiş, kayda değer çok-taraflı koalisyondur.
#
# Tasarım kararları (manifest v3'e bağlı):
# - Dar tanım (resmi anlaşmalar) + sınırlı sayıda kayda değer de facto koalisyon
# - Önemli üyelik değişimleri ayrı varlıklar olarak listelenir (NATO_12, NATO_15, ...)
# - COW numeric kodları kullanılır (country_master.parquet ile birebir hizalanır)
# - Hâlâ aktif koalisyonlar için 'end_year: null' (sağ-sansürlü hayatta kalma verisi)
# - Alman birleşmesi (1990): GFR(260) pre-1990, GMY(255) post-1990. Her iki kod da
#   listelenir; 03_coalition_samples country_master ile filtreleyerek yıla uygun olanı tutar.
#
# Veri kaynakları:
# - ATOP v5.1 (formal alliances)
# - COW Formal Alliances v4.1
# - Akademik IR kaynakları (Walt 1987, Snyder 1997, vb.)
#
# Şema:
#   id: kısa benzersiz id
#   name: tam ad
#   type: alliance | bloc | summit_group | de_facto
#   start_year, end_year: kapsama dönemi (end_year null = hâlâ aktif)
#   members: [COW kodu listesi]
#   region: coğrafi bölge etiketi
#   notes: kısa açıklama / üyelik kaynağı

